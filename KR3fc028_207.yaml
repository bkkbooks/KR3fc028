  text: 建亥月應鍾爲均主俗名淸商調之高者一弦六弦散聲吹夷則定是爲應鍾之羽二弦七弦散聲吹應鍾定是爲應鍾之宮三弦散聲吹大呂定是爲應鍾之商四弦散聲吹夾鍾定是爲應鍾之角五弦散聲吹蕤賓定是爲應鍾之徵
