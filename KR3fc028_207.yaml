body:
  text: 建亥月應鍾為均主俗名淸商調之高者一弦六弦散聲吹夷則定是為應鍾之羽二弦七弦散聲吹應鍾定是為應鍾之宮三弦散聲吹大呂定是為應鍾之商四弦散聲吹夾鍾定是為應鍾之角五弦散聲吹蕤賓定是為應鍾之徵
