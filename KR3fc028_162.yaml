body:
  text: 建戍月無射爲均主俗名清商調之平者旋宮第五十一調屬水無射之羽林鐘起調林鐘畢曲旋宮第五十二調屬火無射之徵仲呂起調仲呂畢曲旋宮第五十三調屬木無射之角太蔟起調太蔟畢曲旋宮第五十四調屬金無射之商黃鐘起調黃鐘畢曲旋宮第五十五調屬土無射之宮無射起調無射畢曲建亥月應鐘爲均主俗名清商調之高者旋宮第五十六調屬水應鐘之羽夷則起調夷則畢曲旋宮第五十七調屬火應鐘之徵蕤賔起調蕤賔畢曲旋宮第五十八調屬木應鐘之角夾鐘起調夾鐘畢曲旋宮第五十九調屬金應鐘之商大呂起調大呂畢曲旋宮第六十調屬土應鐘之宮應鐘起調應鐘畢曲筭經目錄竟
