body:
  text: 余患累黍者而無所憑據依鈔尺以爲主庶幾不差毫釐夫鈔尺者本名工部營繕司營造尺即今木匠曲尺是也柑傳以爲魯般所製惟此尺天下同雖然處處皆同微細軟量不無小異較尺秘法取鈔不經雨濕樣製佳者分中折一道紋自上至下黑邊外齊是為一尺此乃較尺秘法律呂正論鈔尺條下載之詳矣贊曰大明寶鈔洪武舊制銅版頒行玉尺傳世律凡三等九九九十黍亦三種斜臥正立縱黍律長八十一分秦漢已前其説先聞斜黍黃鐘律長九寸自漢已後多泥此論橫黍云何圍寸長尺三者容黍皆千二百律家不曉尺異管同互有偏執鮮克圓融圓融非難鈔尺爲主一管四面內規外矩容黍如式吹聲可取已上凡例乃此書中最緊要者
  hash: sha256:36d792c3da4192e27269f457bef3a437490d1abf5bd72ab45fd6d2ec31498ef8
