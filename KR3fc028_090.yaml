body:
  text: 作二十寸命作二歸自此巳後有歸有除於實第一位歸實呼二一添作五起一還二只得四寸下法亦置四寸於二十寸之下共得二十四寸於實第二位除實呼四四除一十六餘實四寸倍下法四寸改作八寸共得二十八寸於實第三位歸實呼逢二進一十得一分下法亦置一分於二十八寸之下共得二十八寸一分於實第三位除實呼一八退位除八於第四位除實呼一一退位除一餘實一寸一十九分倍下法一分改作二分共得二十八寸二分於實第三位歸實呼二一添作五起一還二只得四釐下法亦置四釐於二十八寸二分之下共得二十八寸二分四釐於實第四位除實呼四八除三十二於第五位除實呼二四退位除八於第六位除實呼四四除一十六餘實六分四釐倍下法四釐改作八釐共得二十八寸二分八釐於實第五位歸實呼逢四進二十得二毫下法亦置二毫於二十八寸二分八釐之下共得二十八寸二分八釐二毫於實第五位除實呼二八除一十六於第六位除實呼二二退位除四於第七位除實呼二八除一十
