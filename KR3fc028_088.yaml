body:
  text: 三十六萬巳上開六百四十九萬巳上開七百六十四萬巳上開八百八十一萬巳上開九百周禮栗氏為量第二問周禮栗氏為量內方尺而圓其外算法求方之斜即圓之徑其斜弦長幾何答曰斜弦一尺四寸一分四釐二毫一絲三忽五微六纖二三七三九五四八八一六八九纖巳下數不立名色法曰依勾股求弦算置方面自南至北一十寸自乘得一百寸為股羃別置方面自東至西一十寸自乘得一百寸為勾羃相並共得二百寸為弦羃就置弦羃二百寸為實看前式內一百巳上該開一十寸命作一歸為下法用開方歸除法除之於實首位歸實呼逢一進一十得一十寸有歸不除餘實一百寸倍下法一十寸改
