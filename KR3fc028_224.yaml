body:
  text: 置周四尺四寸四分四釐四毫四絲四忽四微四纖在位九因得四百寸爲實卽四十倍方而之數四十爲法除之得一十寸卽圓內方一面之數自乘得一百寸卽圓內容方全數也倍之得二百寸卽徑自乘所得爲實開平方法除之得一尺四寸一分四釐二毫一絲三忽五微六纖卽其徑也一尺乘周爲實三尺一寸四分二釐六毫九絲六忽八微爲法除之亦得徑求面羃第四置徑全數卽弦自乘得二百寸弦羃以二百寸自乘得四萬寸又以一百乘之得四百萬寸爲實以一百六十二爲法除之得二萬四千六百九十一寸三五八爲實開平方法除之得一百五十七寸一三四八四是爲釜之面羃周求面羃第五置周全數九因得四百寸九箇周是四十箇勾以四
