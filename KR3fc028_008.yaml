body:
  text: 此改治權衡不見省夫晉尺長於古尺纔四分有奇而虞頠尚以爲不便況今尺長於古尺多矣寧無害事乎醫家有仲景肘後千金外臺諸方所用皆古斗秤尺其云每服一升今升豈能服盡一升故知古升耳又針灸穴道皆是古尺分寸若用尺非宜則關係人之生命豈細務耶此亦好古之士所當詳究者也令將累黍推定三器並歷代沿革損益者之於篇使夫學者有以考其得失云耳或難曰同律度謹權量乃聖人之事子何人也而敢及此得非僭乎曰不然也先儒有言宇宙內事已分內事也故君子所以堯舜其君堯舜其民者無不在吾分內達則兼善天下窮則獨善一身其理一也格物致知者獨善之術也治國平天下者兼善之道也今儒者以匹夫之身而言平天下不絕於口人不以爲
