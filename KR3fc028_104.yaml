body:
  text: 亦置一纖於二十三寸七分八釐四毫一絲四忽二微之下共得二十三寸七分八釐四毫一絲四忽二微一纖於實第九位除實呼一三退位除三於第十位除實呼一七退位除七於第十一位除實呼一八退位除八於第十二位除實呼一四退位除四於第十三位除實呼一一退位除一於第十四位除實呼一四退位除四於第十五位除實呼一二退位除二於第十六位除實呼一一退位除一餘實一毫一十八絲九十八忽五十四微二十九纖四八八一六八九自此巳後開至二十五位其術同前但纖巳下不立名色所得長一尺一寸八分九釐二毫七忽一微一纖五二七二一六六七一七五即南呂倍律也半之得五寸九分四釐六毫三忽五微五纖七五一三六五三三三五八七五即南呂正律也置南呂倍律長一尺一寸八分九釐二毫
