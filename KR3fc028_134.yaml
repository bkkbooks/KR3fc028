body:
  text: 不幸絶傳於世所以深惜之故有是作也黃鍾為諸律祖古今所知應鍾為諸率母古今所不知余請詳言之應鍾建亥象坤卦也黃鍾建子象復卦也參同契曰終坤始復如循連環故律呂有循環之理古今昧者以為往而不反豈不大謬今欲明古密率皆自立方應鍾積算中來上文所得一尺五分九釐四毫六絲三忽名為通長之率亦名面羃之率自相乘得一一二二四六二名為積實之率亦名容黍之率置應鍾積算進一位為實開平方法除之得一二九三二名為周徑之率首位皆命作一尺其乘除法下文詳矣此條但發明應鍾為諸率之母耳求十二律通長第七黃鍾長一尺
