body:
  text: 開方所得四十乘之九歸得三尺一寸四分二釐六毫九絲六忽八微為臀之內周其一不折半開方得十寸為臀之內徑周與徑相乘四歸復得臀之面羃以深一寸乘之得臀受一豆之積實而還元矣耳之面羃周徑第十三經云其耳三寸其實一升今按三寸誤也當作四寸古文三三字體相類傳寫多錯何以知其為四寸耶法度之器必取整數四寸求之內徑二寸五分得四分尺之一三寸求之內徑二寸八分八釐六毫七絲五忽有奇周九寸分七釐二毫一絲八忽有奇面羃六寸五十四分七十二釐八十五毫如此則於自然之理似不相合恐是傳寫之誤若依四寸求之妙不可言矣置一升之積數一十九寸六百四十一分
