body:
  text: 七五即南呂倍律也法曰置所得蕤賓長一十四寸一分四釐二毫一絲三忽五微六纖二三七三九五四八八一六八九以黃鍾長十寸乘之得平方積一百四十一寸四十二分一十三釐五十六毫二十三絲七十三忽九微五十纖四八八一六八九為實看前式內一百巳上該開一十寸命作一歸為下法用開方歸除法除之於實首位歸實呼逢一進一十得一十寸有歸不除餘實四十一寸四十二分一十三釐五十六毫二十三絲七十三忽九微五十纖四八八一六八九倍下法一十寸改作二十寸命作二歸自此巳後有歸有除於實第二位歸實呼逢二進一十得一寸下法亦置一寸於二十寸之下共得二十一寸於實第二位除實呼一一退位除一餘實二十寸四十二分一十三釐五十六毫二十三絲七十三忽九微五十纖四八八一六八九倍下法一寸改作二寸共得二十二寸於實第二位歸實呼見二無除作九二起一還二得八分下法亦置八分於二十二寸之下共得二十二寸八分於實第三位除實呼二八除一十六於
