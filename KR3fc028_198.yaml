body:
  text: 建申月夷則為均主俗名縵角調之高者一弦六弦散聲吹夷則定是為夷則之宮二弦七弦散聲吹無射定是為夷則之商三弦散聲吹黃鍾定是為夷則之角四弦散聲吹夾鍾定是為夷則之徵五弦散聲吹仲呂定是為夷則之羽
