body:
  text: 亦得或四因二十進一位以除臀之面羃或四歸二十進一位以除耳之面羃或倍釜之內徑以除臀之周徑或半釜之內徑以除耳之周徑皆得黃鍾面羃周徑之數此一段理極妙而文尤略恐人難曉是故自注以示初學釜之積實一千五百七十一寸三四八四為實以一千六百籥為法除之得九百八十二分九二七五是為黃鍾之積實臀之積實七十八寸五六七四二為實四因二十得八十為法除之亦得黃鍾之積實耳之積實十九寸六四一八五五為實二十為法除之亦得黃鍾之積實釜之面羃一百五十七寸一三四八四為實以一千六百為法除之得九分八十二釐九二七五是為黃鍾之面羃臀之面羃七十八寸五六七四二為實四因二十命作八百為法除之亦得黃鍾之面羃耳之面羃四寸九十一分四六三七五為實四歸二十命作五十為法除之亦得黃鍾之面羃釜之周四尺四寸四分四釐四毫四四四四為實四十為法除之得一寸一分一釐一毫一一一一是為黃鍾之內周臀之周三尺一寸四分二釐六毫九六八為實倍釜徑得二尺八寸二分八釐四毫二七一二為法除之亦得黃鍾之內周耳之周七寸八分五釐六毫七四二為實半釜徑得七寸分七釐一毫六七八為法除之亦
