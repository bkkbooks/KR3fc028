body:
  text: 鍾之律可求然則律輿度量衡相須爲用非度量衡生於律也自近世之論起求律於無憑據之元聲候管於無證驗之灰氣其視度量衡以爲未節之務不暇較其是非殊不思度量衡實與律相爲始終經緯表裏者也論語言爲政之術先之以謹權量以道寓器以器明道天下得以因器會道由是四方之政行矣聖人於粗迹皆有精義存焉蓋世俗之情恒喜大秤大斗用以掊尅聚斂高下其手亂之始也故謹之亦在於始祈謂探賾索隱鉤深致遠者是物也晉陳勰掘地得古尺尚書奏宜改今尺以古爲正潘岳以爲不宜改摯虞駁曰今尺長於古尺幾於半寸樂府用之律呂不合史官用之曆象失占醫局用之孔穴乖錯直如所奏元康中裴頠以爲醫方人命之急而稱兩不與古同爲害特重宜因
  hash: sha256:33dc956aab0d7dbc68f5f5fc0d2120d9b79aec0a5e064955234bd80d53ec67dc
