body:
  text: 太煩削去自分巳下惟取自寸巳上故名約率圓周二十二也夫約率之作蓋俗士因陋就簡之弊不如周公密率遠矣隋志不載周公密率指祖沖之所造淺陋之率謂之密率遂致後學之士不復知有聖人製作之妙妄指約率以為沖之所造何哉約率近密不知誰造指為沖之所造非也沖之之率最極疏舛圓徑一百一十三分圓周三百五十五分徑有餘而周不足沖之截去零數不用是以謂之淺陋周徑相乘得面羃平圓積第四取前半徑七寸分七釐一毫絲六忽七微八纖與前半周二尺二寸二分二釐二毫二絲二忽二微二纖相乘得一百五十七寸一十三分四十八釐四十毫是為釜之面羃又法置全徑而與全周相乘為實四歸亦得面羃之數與上文相同也夫此二法可謂自然極妙之圓率也
