body:
  text: 一忽一微一纖是爲黃鍾律管內周之數副置前項所得一十二分半爲實不折半以開平方法除之得三分五釐三毫五絲五忽三微三纖九塵是爲黃鍾律管內徑之數徑與周相乘四歸得黃鍾面羃以長一百分乘之得黃鍾積實乃還元矣臋之面羃周徑第十二經云其臋一寸謂深一寸也不言周徑者據四升爲豆之積數求周徑不難矣置一豆之積數七十八寸五百六十七分四百二十釐在位以深一寸除之得平圓積七十八寸五十六分七十四釐二十毫是爲臋之面羃自乘得六千一百七十二寸八百三十九分四百八十五釐以一百六十二乘之一百除之得一萬寸開平方法除之得一百寸副置之其一折半爲實
  hash: sha256:52b4b7105cf9212cb4f16c8aa2063c8b3b203f5155deb59ea1d06aa81e0bc3fe
