body:
  text: 一忽一微一纖是為黃鍾律管內周之數副置前項所得一十二分半為實不折半以開平方法除之得三分五釐三毫五絲五忽三微三纖九塵是為黃鍾律管內徑之數徑與周相乘四歸得黃鍾面羃以長一百分乘之得黃鍾積實乃還元矣臀之面羃周徑第十二經云其臀一寸謂深一寸也不言周徑者據四升為豆之積數求周徑不難矣置一豆之積數七十八寸五百六十七分四百二十釐在位以深一寸除之得平圓積七十八寸五十六分七十四釐二十毫是為臀之面羃自乘得六千一百七十二寸八百三十九分四百八十五釐以一百六十二乘之一百除之得一萬寸開平方法除之得一百寸副置之其一折半為實
  hash: sha256:ebd50ff186b5bafd6e047f23d10ac84cde444972ce28f1f598fe4ef230f81a26
