body:
  text: 余著樂律全書八音備矣此篇惟用一人吹律一人彈琴一人擊缶而歌余亦自歌互相倡和而樂在其中矣語曰子與人歌而善必使反之而後和之此之謂也子於是日哭則不歌其非哭之日蓋無日不歌歌之義大矣哉夫八音備而近於奢以其用人多也曷若一琴一缶一吹一歌足以自樂嗚呼此趣惟達者能知之嘉量算經下卷
