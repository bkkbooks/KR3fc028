body:
  text: 考周徑積實第二十四問曰周徑積實考以何法驗其是否答曰考徑用竹筯粗細如簾條稍頭劈開夾銅葉一小塊各照其尺所載徑數通入於其管內此考徑大略也考周用桐木削成形如筯塞入管中取出緊處紙條圍畢割開置於尺上看與分寸合否此考周大略也考積實法以水銀實其管驗其容受稱其分兩與算合否周徑積實互相合乃可耳問曰古人實管以黍黍虛實難憑據改用井水準其槩矣今又改用水銀何也答曰此新法也水比黍雖近密然猶未也水銀密於水矣嘗以木作立方橫黍一寸之模實以水銀稱之重今天平六兩二錢以千分除之得六釐二毫遂以六釐二毫為率乘各律之積實則得其管所受水銀之數
