body:
  text: 南北竹所長第二十七宜陽北竹有溝節而長節者少僅有黃鍾正律而無倍律餘杭南竹無溝節而多長節者故黃鍾正律倍律兼有之北竹皮薄閒有佳者兩端如一不犯修理自然合式此其所長也南竹皮厚內周內徑難得惟外周外徑絶妙然而兩端不得如一內周內徑必須修理始得此亦所長也北竹瓤其兩節中閒空虛無物南竹瓤則不然其中閒段段白膜形如榆錢此北竹所無也余往年移永寧縣竹栽書齊前今皆成林成大竹矣後又移餘杭縣竹栽書窗四面今亦成林夭夭然美好異於尋常竹為其葉密而節長可愛也舉要言之若造大小排簫則南竹佳若作單吹正律則北竹妙仔細揀選天生合式之管惟北竹有而南
