body:
  text: 四除之凡除兩遍得耳之面羃四寸九十一分四釐六十三毫七十五絲臀之積實七十八寸五百六十七分四百二十釐以四除之則得耳之積實一十九寸六百四十一分八百五十五釐余於上卷耳之條下謂依四寸求則妙不可言指此也若依三寸求則無味此惟可與達者言之且以形言四寸亦勝三寸周公豈不知三寸不如四寸故知三乃傳寫之誤釜外方羃每面一尺六寸內外共積二百五十六方每方當合黍尺一寸此圖乃小樣爾其方每面十分共積一百分其分每面十釐共積一百釐釐毫以下仿此釜徑一尺四寸一分四釐有奇則是十四方有奇也圖中大圓者即釜之唇也兩角小圓者即耳之唇也
  hash: sha256:bbb8dd269f9d5d623db520a9c6d718efdbeaff2c79b8c879d3ffff6ff249cd3b
