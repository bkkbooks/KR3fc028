body:
  text: 建午月蕤賓為均主俗各緊羽調之高者一弦六弦散聲吹夷則定是為蕤賓之商二弦七弦散聲吹無射定是為蕤賓之角三弦散聲吹大呂定是為蕤賓之徵四弦散聲吹夾鍾定是為蕤賓之羽五弦散聲吹蕤賓定是為蕤賓之宮
