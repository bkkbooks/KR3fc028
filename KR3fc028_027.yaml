body:
  text: 釜徑一尺四寸一分四釐三毫一絲三忽五微六纖則是十四方有奇也圓內黑方者所謂方尺也即橫黍黃鍾長十寸是也每面方十寸共積一百寸万外圓內全方三十二寸其餘黑白全破之方立相補湊共積一百五十七寸有奇為釜之面羃以深一尺乘之得一千五百七十一寸有奇則釜之積實也
  hash: sha256:02badc1d51860a6b45c3233102e60e131eec4bd0f1fbc2c2b44b33d9b9a918e8
