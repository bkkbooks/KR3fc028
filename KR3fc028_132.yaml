body:
  text: 應鍾爲諸率母第六置所得子午卯酉四正界限各在位先以應鍾乘黃鍾得應鍾次以應鍾除黃鍾得大呂此北方亥子丑三律若所得在一尺巳上倍律也一尺巳下正律也五寸巳下半律也餘律皆放此或進位或退位或加倍或折半各隨其宜務得本律正數而巳次以應鍾乘蕤賓得仲呂次以應鍾除蕤賓得林鍾此南方巳午未三律也次以應鍾乘夾鍾得太蔟次以應鍾除夾鍾得姑洗此東方寅卯辰三律也次以應鍾乘南呂得夷則次以應鍾除南呂得無射此西方申酉戍三律也凡十二律皆以應鍾爲率而乘除之各得其倍正半三種之眞數又何必用古人三分損益隔八相生疏舛之法哉余所撰嘉量筭經蓋爲周公舊制
  hash: sha256:ea91a3a4dd559230d1c302dd6030f7f81af41386d75330f8c28eb6185e948a21
