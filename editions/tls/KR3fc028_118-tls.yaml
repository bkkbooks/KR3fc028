body:
  text: 三億四千三百萬巳上開七百五億一千二百萬巳上開八百七億二千九百萬巳上開九百隅法定式立積隅法其理一也俱要念誦極熟亥子循環相生第五問南呂倍律長一尺一寸八分九釐二毫七忽一微一纖五二七二一六六七一七五以黃鍾長十寸再乘得立方積一千一百八十九寸二百七分一百一十五釐二毫七百二十一絲六十六忽七百一十七微五百纖開立方法除之所得卽應鍾倍律其長幾何
