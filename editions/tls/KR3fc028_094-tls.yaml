body:
  text: 七位歸實呼二一添作五得五微下法亦置五微於二十八寸二分八釐四毫二絲六忽之下共得二十八寸二分八釐四毫二絲六忽五微於實第八位除實呼五八除四十於第九位除實呼二五除一十於第十位除實呼五八除四十於第十一位除實呼五四除二十於第十二位除實呼二五除一十於第十三位除實呼五六除三十於第十四位除實呼五五除二十五餘實一十七毫六十四絲一十七忽七十五微倍下法五微改作一忽微共得二十八寸二分八釐四毫二絲七忽微於實第八位歸實呼二一添作五逢二進一十得六纖下法亦置六纖於二十八寸二分八釐四毫二絲七忽微之下共得二十八寸二分八釐四毫二絲七忽六纖於實第九位除實呼六八除四十八於第十位除實呼二六除一十二於第十一位除實呼六八除四十八於第十二位除實呼四六除二十四於第十三位除實呼二六除一十二於第十四位除實呼六七除四十二至第十五位下法空微無除於第十六位除實呼六六除三十六餘實六十七絲一十二忽一十二微六十四纖
