body:
  text: 後學載堉著釜乃八斗第一洪武正韻鍾字條下解鍾爲八斛余因此乃悟左傳謂釜十則鍾鍾爲八斛則釜爲八斗明矣先儒解爲六斗四升非也一言透徹則律度量衡之理悉透徹而無餘蘊千載絕傳之學余幸而得之若更使絕傳則不仁矣豈不聞論語曰人能弘道非道弘人繼絕表微此之謂歟釜之徑爲徑率第二經謂此釜深尺內方尺而圓其外此乃筭家所謂圓內容方方外求圓卽勾股求弦法也內方一尺縱十寸名爲股自乘得一百寸名爲股羃橫十寸名爲勾自乘得一百寸名爲勾羃相併得二百寸名爲弦羃
  hash: sha256:4874ccd37e089a6abab2279d6a4dd8709e5aa9054ffabfdaca392d9cd492a178
