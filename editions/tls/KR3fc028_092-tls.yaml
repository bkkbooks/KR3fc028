body:
  text: 六於第八位除實呼二二退位除四餘實三十八釐三十六毫倍下法二毫改作四毫共得二十八寸二分八釐四毫於實第六位歸實呼逢二進一十得一絲下法亦置一絲於二十八寸二分八釐四毫之下共得二十八寸二分八釐四毫一絲於實第六位除實呼一八退位除八於第七位除實呼一二退位除二於第八位除實呼一八退位除八於第九位除實呼一四退位除四於第十位除實呼一一退位除一餘實一十釐七毫五十九絲倍下法一絲改作二絲共得二十八寸二分八釐四毫二絲於實第六位歸實呼二一添作五起二還四只得三忽下法亦置三忽於二十八寸二分八釐四毫二絲之下共得二十八寸二分八釐四毫二絲三忽於實第七位除實呼三八除二十四於第八位除實呼二三退位除六於第九位除實呼三八除二十四於第十位除實呼三四除一十二於第十一位除實呼二三退位除六於第十二位除實呼三三退位除九餘實一釐五十九毫六絲三十一忽倍下法三忽改作六忽共得二十八寸二分八釐四毫二絲六忽於實第
