body:
  text: 是爲黃鍾面羃又置釜之內周四尺四寸四分四釐四毫四絲四忽四微四纖爲實以四十爲法除之得一寸一分一釐一毫一絲一忽一微一纖是爲黃鍾內周又置釜之內徑一尺四寸一分四釐二毫一絲三忽五微六纖爲實以四十爲法除之得三分五釐三毫五絲五忽三微三纖九塵是爲黃鍾內徑天地自然眞數如此黃鍾面羃周徑密率第十一舊用圍三徑一之率以求周徑最極疏舛依周公古率置黃鍾面羃自乘所得在位一百六十二乘之得一萬五千六百二十五分以一百除之得一百五十六分二十五釐爲實開平方法除之得一十二分半副置之其一折半開方得二分五釐以四十乘之九歸得一寸一分一釐一毫一絲
  hash: sha256:0358ba31c06011d43ce49903b1a671d1b6c0b688fc3b1e056bc7b9198700fd58
