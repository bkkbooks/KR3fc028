body:
  text: 僭考分所固有也予此書不過格物致知之一端耳飽食終日無所用心以觚翰代博弈編屬舊文敷陳新義以俟後之君子所謂何傷乎亦各言其志也而已若夫同律度謹權量此則聖人兼善之事吾何與焉雖然吾書亦未易讀荀子曰人莫不好言其所善而君子尤甚予爲人無所長惟筭術是好固其所好而益窮之以求至乎其極用力既久豁然貫通故有得先儒所未得發先儒所未發者存焉憫鍾律之失傳竭平生之心力而爲此書以淺近之辭發揮高深之理以幽微之數研究迂闊之學得其精而忘其粗全同相馬有其巧而無其用殆似屠龍一以自喜一以自笑安知來世讀吾書者不喜吾之所喜而笑吾之所笑哉問者亦哂而退余以所聞所答冠其篇云後學裁堉序
  hash: sha256:f1d8eae4411f5dcc46556e75b12260eb3ee4292e5283c724880d70f6f8917a78
