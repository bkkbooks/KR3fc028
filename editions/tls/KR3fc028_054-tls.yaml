body:
  text: 升也置一升之積數一十九寸六百四十一分八百五十五釐在位四因得七十八寸五百六十七分四百二十釐是爲一豆之積數又四因得三百一十四寸二百六十九分六百八十釐是爲一區之積數又五因得一千五百七十一寸三百四十八分四百釐而釜之積實還元矣釜豆升互相求得黃鍾第十五合龠爲合合乃二龠也十合爲升升乃二十龠也十升爲斗斗乃二百龠也八斗爲釜釜乃一千六百龠也以一千六百除釜之積數得九百八十二分百九十二釐七百五十毫與今新測黃鍾一龠之積密合又以二十龠四因得八十爲法以除臋之積數得黃鍾一龠之積數亦無不合又置耳之積數爲實一升乃二十龠除之
  hash: sha256:89bacc3e1fbf0fee84aa1803c48b748d4ce367f874a848539a6da82d5469ff22
