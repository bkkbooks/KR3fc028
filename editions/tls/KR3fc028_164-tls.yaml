body:
  text: 後學載堉著旋宮本無難欲學先學彈琴依律呂定弦從操縵安易若指循掌熟如珠走盤正應和同譜留神仔細看操縵主意聲依永也凡彈操縵者只按十徽音十徽尋不見方去九徽尋餘徽通不用異乎世俗琴君子近琴瑟非以爲慆心依永主意律和聲也十徽按一弦與散聲相應有鍾有磬從頭再作共該三十二聲十徽按二弦與散聲相應有磬無鍾則不再作只該一十六聲
