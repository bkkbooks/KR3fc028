body:
  text: 圓內黑方者所謂方尺也每面十寸共積一百寸方外圓內有全方三十二寸其餘破方互相補湊得二十五寸有奇黑白全破之方共積一百五十七寸有奇爲鬴之面羃以深一尺乘之得一千五百七十一寸有奇則鬴之積實也耳徑二寸五分則與十字中心合筭黃鍾三種律第十一橫黍律長十寸史記所謂子一分者是也一分猶言一尺卽十寸也斜黍律長九寸後漢志所謂黃鍾律長九寸者是也縱黍律長八寸一分淮南子所謂黃鍾之數八十一是也橫黍內周一寸一分一釐一毫斜黍內周一寸置斜黍進位九歸得橫黍退位九因得縱黍餘放此縱黍內周九分橫黍內徑三分五釐三毫
  hash: sha256:2e02bebe5c653201795f784a2f9ef142b7d5beb4f66cf11da6e61c5b06d448dc
