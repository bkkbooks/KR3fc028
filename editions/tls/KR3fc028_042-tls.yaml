body:
  text: 分八百五十五釐是爲一升之積數合之積數第八一升者十合也置前所得一升積數一十九寸六百四十一分八百五十五釐爲實十合除之得一寸九百六十四分一百八十五釐五百毫是爲一合之積數龠之積數第九一合者二龠也置前所得一合積數一寸九百六十四分一百八十五釐五百毫爲實二龠除之得九百八十二分百九十二釐七百五十毫是爲黃鍾一龠積數以此證之則知積八百一十分非也黃鍾面羃周徑眞數第十古黃鍾凡三種一曰縱黍尺黃鍾長八寸一分淮南子曰黃鍾位子其數八十一指此也二曰斜黍尺黃鍾長九寸後漢志曰
  hash: sha256:695391b9cd9b547446ccd8af5cc4d7eb0c71a56e60866702939c2630581a67e0
