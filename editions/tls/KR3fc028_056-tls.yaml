body:
  text: 亦得或四因二十進一位以除臋之面羃或四歸二十進一位以除耳之面羃或倍釜之內徑以除臋之周徑或半釜之內徑以除耳之周徑皆得黃鍾面羃周徑之數此一段理極妙而文尤略恐人難曉是故自註以示初學釜之積實一千五百七十一寸三四八四爲實以一千六百龠爲法除之得九百八十二分九二七五是爲黃鍾之積實臋之積實七十八寸五六七四二爲實四因二十得八十爲法除之亦得黃鍾之積實耳之積實十九寸六四一八五五爲實二十爲法除之亦得黃鍾之積實釜之面羃一百五十七寸一三四八四爲實以一千六百爲法除之得九分八十二釐九二七五是爲黃鍾之面羃臋之面羃七十八寸五六七四二爲實四因二十命作八百爲法除之亦得黃鍾之面羃耳之面羃四寸九十一分四六三七五爲實四歸二十命作五十爲法除之亦得黃鍾之面羃釜之周四尺四寸四分四釐四毫四四四四爲實四十爲法除之得一寸一分一釐一毫一一一一是爲黃鍾之內周臋之周三尺一寸四分二釐六毫九六八爲實倍釜徑得二尺八寸二分八釐四毫二七一二爲法除之亦得黃鍾之內周耳之周七寸八分五釐六毫七四二爲實半釜徑得七寸分七釐一毫六七八爲法除之亦
