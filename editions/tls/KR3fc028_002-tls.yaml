body:
  text: 或問於余曰昔周公作嘉量何爲而作也曰余聞諸先儒曰聲無形而樂有器古之作樂者知器之必有敝而聲不可以言傳懼器失而聲遂亡也乃多爲之法以著之故始求聲者以律而造律者以黍自一黍之廣積而爲分寸一黍之多積而爲龠合一黍之重積而爲銖兩此造律之本也故爲長短之法而著於度爲多少之法而著於量爲輕重之法而著於權衡是三物者亦必有時而敝則又總其法而著於數使其分寸龠合銖兩皆起於黃鐘然後律度量衡相用爲表裏使得律者可以制度量衡因度量衡亦可以制律不幸而皆亡則推其法數而制之用其長短多少輕重以相參考四者既同而聲必至聲至而後樂可作矣夫物用於有形而必敝聲藏於
  hash: sha256:5e0b70e30c7ee29e1623877fddbe9e237ff7a727a5a08c7dc9d008b175a18c5e
