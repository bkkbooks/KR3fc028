body:
  text: 旋宮第二十四調屬金姑洗之商蕤賔起調蕤賔畢曲旋宮第二十五調屬土姑洗之宮姑洗起調姑洗畢曲建巳月仲呂爲均主俗名緊羽調之平者旋宮第二十六調屬水仲呂之羽太蔟起調太蔟畢曲旋宮第二十七調屬火仲呂之徵黃鐘起調黃鐘畢曲旋宮第二十八調屬木仲呂之角南呂起調南呂畢曲旋宮第二十九調屬金仲呂之商林鐘起調林鐘畢曲旋宮第三十調屬土仲呂之宮仲呂起調仲呂畢曲建午月蕤賔爲均主俗名緊羽調之高者旋宮第三十一調屬水蕤賔之羽夾鐘起調夾鐘畢曲旋宮第三十二調屬火蕤賔之徵大呂起調大呂畢曲旋宮第三十三調屬木蕤賔之角無射起調無射畢曲旋宮第三十四調屬金蕤賔之商夷則起調夷則畢曲旋宮第三十五調屬土蕤賔之宮蕤賔起調蕤賔畢曲建未月林鐘爲均主俗名縵角調之平者旋宮第三十六調屬水林鐘之羽姑洗起調姑洗畢曲
