body:
  text: 寸七分八釐四毫絲之下共得二十三寸七分八釐四毫絲七忽於實第七位除實呼三七除二十一於第八位除實呼七七除四十九於第九位除實呼七八除五十六於第十位除實呼四七除二十八第十一位下法空絲無除於第十二位除實呼七七除四十九餘實二十七毫三十五絲二十四忽九微五十纖四八八一六八九倍下法七忽改作一絲四忽共得二十三寸七分八釐四毫一絲四忽於實第八位歸實呼逢二進一十得一微下法亦置一微於二十三寸七分八釐四毫一絲四忽之下共得二十三寸七分八釐四毫一絲四忽一微於實第八位除實呼一三退位除三於第九位除實呼一七退位除七於第十位除實呼一八退位除八於第十一位除實呼一四退位除四於第十二位除實呼一一退位除一於第十三位除實呼一四退位除四於第十四位除實呼一一退位除一餘實三毫五十六絲八十二忽六十八微五十纖四八八一六八九倍下法一微改作二微共得二十三寸七分八釐四毫一絲四忽二微於實第九位歸實呼逢二進一十得一纖下法
