body:
  text: 凡開立方將筭盤梁上帖紙一條寫千百十寸百十分百十釐百十毫百十絲百十忽百十微百十纖之名至於纖巳下位數不立名色只隔二位畫一圈使開方除實不錯耳立方積立方千纖爲一微千微爲一忽千忽爲一絲千絲爲一毫千毫爲一釐千釐爲一分千分爲一寸千寸爲一尺故曰幾百幾十幾尺幾百幾十幾寸幾百幾十幾分幾百幾十幾釐幾百幾十幾毫幾百幾十幾絲幾百幾十幾忽幾百幾十幾微幾百幾十幾纖又立積一一再乘所得也
