body:
  text: 後學載堉著初學開平方例第一用歸除開平方各筭書未載是故詳載之凡學開方須造大筭盤長九九八十一位或六六三十六位方可筭也筭盤梁上帖紙一長條上寫第一位第二位等項字樣使初學易曉也平方積平立二積初學難曉故表出之平方百纖爲一微百微爲一忽百忽爲一絲百絲爲一毫百毫爲一釐百釐爲一分百分爲一寸百寸爲一尺故曰幾十幾尺幾十幾寸幾十幾分幾十幾釐幾十幾毫幾十幾絲幾十幾忽幾十幾微幾十幾纖又平積
