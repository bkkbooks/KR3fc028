body:
  text: 求十二律積實第九黃鍾積實九百八十二分九十二釐置釜之積實在位以一千六百爲法除之得黃鍾積實進一位爲實應鍾自乘所得命作一尺一二二四六二爲法除之大呂積實八百七十四分九百四十五釐太蔟積實七百七十九分四百八十七釐夾鍾積實六百九十四分四百四十四釐姑洗積實六百一十八分六百七十九釐仲呂積實五百五十一分一百八十釐蕤賓積實四百九十一分四十六釐林鍾積實四百三十七分四百七十二釐夷則積實三百八十九分七百四十三釐南呂積實三百四十七分二百二十二釐無射積實三百九分三百三十九釐應鍾積實二百七十五分五百九十釐
