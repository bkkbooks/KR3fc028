body:
  text: 堉又按晏子曰四升爲豆各自其四以登於釜釜十則鐘管子曰齊西之粟釜百泉則鏂二十也齊東之粟釜十泉則鏂二泉也論語曰與之釜與之庾與之粟五秉儀禮曰十斗曰斛十六斗曰籔十籔曰秉鄭註云今文籔爲逾逾即庾也小爾雅曰鍾二謂之秉秉十六斛已上諸説合而觀之所謂二鍾爲秉秉十六斛則鍾爲八斛也所謂釜十則鍾鍾乃八斛則釜乃八斗也釜粟百錢區二十錢釜粟十錢而區二錢則五區爲釜亦明矣四升爲豆四豆爲區此以四而登也五區爲釜釜乃八斗十釜爲鐘鐘乃八斛二四如八亦以四而登也此晏子所謂各自其四以登於釜也先儒錯會晏子之意遂以六斗四升爲釜誤矣余嘗詳辨之見律學新説
  hash: sha256:727144e23b77ae1621759c1d3eec4579e9ba159776350e41f42a535e1b1628da
