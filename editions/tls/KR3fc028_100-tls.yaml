body:
  text: 第四位除實呼八八除六十四餘實二寸一十八分一十三釐五十六毫二十三絲七十三忽九微五十纖四八八一六八九倍下法八分改作一寸六分共得二十三寸六分於實第三位歸實呼見二無除作九二得九釐下法亦置九釐於二十三寸六分之下共得二十三寸六分九釐於實第四位除實呼三九除二十七於第五位除實呼六九除五十四於第六位除實呼九九除八十一餘實四分九十二釐五十六毫二十三絲七十三忽九微五十纖四八八一六八九倍下法九釐改作一分八釐共得二十三寸七分八釐於實第五位歸實呼逢四進二十得二毫下法亦置二毫於二十三寸七分八釐之下共得二十三寸七分八釐二毫於實第五位除實呼二三退位除六於第六位除實呼二七除一十四於第七位除實呼二八除一十六於第八位除實呼二二退位除四餘實一十六釐九十二毫二十三絲七十三忽九微五十纖四八八一六八九倍下法二毫改作四毫共得二十三寸七分八釐四毫第五位得空絲於第六位歸實呼二一添作五逢四進二十得七忽下法亦置七忽於二十三
