body:
  text: 開方兩遍代之初開平方得一百寸爲實再開平方得一十寸是爲臋之內徑臋之內周第九置臋之面羃七十八寸五六七四二爲實四因得三百一十四寸二六九六八以臋徑十寸爲法除之得三尺一寸四分二釐六毫九絲六忽八微是爲臋之內周此係舊法四因面羃以徑除之得周是也耳之羃積周徑第十問曰經文其耳三寸今則改爲四寸何也荅曰臋之周三尺一寸四分二釐六毫九絲六忽八微以四除之則得耳之周七寸八分五釐六毫七絲四忽二微五歸得黃鍾之外周臋之徑一尺以四除之則得耳之徑二寸五分五歸得黃鍾之外徑臋之面羃七十八寸五十六分七十四釐二十毫以四除之又以
  hash: sha256:16d775d821fd0510aa3d2ea8de0f98a84eb09cb5e9c36cfdbb815b356a3ade23
