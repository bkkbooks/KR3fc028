body:
  text: 荅曰長一尺五分九釐四毫六絲三忽九纖四三五九二九五二六四五六一八二五法曰置所得南呂倍律長一尺一寸八分九釐二毫七忽一微一纖五二七二一六六七一七五初以黃鍾正律長一十寸乘之得一百一十八寸九十二分七釐一十一毫五十絲二忽七十二微一十纖六六七一七五名平方積再以黃鍾正律長一十寸乘之得一千一百八十九寸二百七分一百一十五釐二毫七百二十一絲六十六忽七百一十七微五百纖名立方積爲實商第一位得一尺看式一千寸巳上該商一十寸置於左而於實內減去再乘數一千寸餘實一百八十九寸有奇商第二位得空寸三因所商一十寸得三十寸置於右爲下法與實一百八十九寸相商一寸該三百三十寸實不及減所得空位爲寸
