body:
  text: 後學載堉著密率源流第一問曰釜內方尺而圓其外句股求弦得釜內徑一尺四寸一分四釐二毫一絲三忽五微六纖斯無疑矣何以知內周四尺四寸四分四釐四毫四絲四忽四微四纖也荅曰按周髀古筭經首章載昔者周公問於商高曰竊聞乎大夫善數也請問數安從出商高曰數之法出於圓方圓出於方方出於矩矩出於九九八十一是謂積矩禹之所以治天下者此數之所生也周公曰大哉言數請問用矩之道商高曰環矩以爲圓合矩以爲方方數爲典以方出圓智出於句句出於矩夫矩之於數其裁制萬物唯所爲爾周公曰善哉舊有趙甄李
