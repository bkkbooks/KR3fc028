body:
  text: 三十六萬巳上開六百四十九萬巳上開七百六十四萬巳上開八百八十一萬巳上開九百周禮㮚氏爲量第二問周禮㮚氏爲量內方尺而圓其外筭法求方之斜卽圓之徑其斜弦長幾何荅曰斜弦一尺四寸一分四釐二毫一絲三忽五微六纖二三七三九五四八八一六八九纖巳下數不立名色法曰依勾股求弦筭置方面自南至北一十寸自乘得一百寸爲股羃別置方面自東至西一十寸自乘得一百寸爲勾羃相倂共得二百寸爲弦羃就置弦羃二百寸爲實看前式內一百巳上該開一十寸命作一歸爲下法用開方歸除法除之於實首位歸實呼逢一進一十得一十寸有歸不除餘實一百寸倍下法一十寸改
