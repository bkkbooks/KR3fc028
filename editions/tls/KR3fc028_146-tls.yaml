body:
  text: 求十二律內徑第十二黃鍾內徑三分五釐三毫五絲五忽置釜之內徑在位四十爲法除之得黃鍾之內徑進一位爲實應鍾開方所得命作一尺二九三二爲法除之大呂內徑三分四釐三毫四絲八忽太蔟內徑三分三釐三毫七絲忽夾鍾內徑三分二釐四毫二絲忽姑洗內徑三分一釐四毫九絲七忽仲呂內徑三分釐六毫絲忽蕤賓內徑二分九釐七毫二絲九忽林鍾內徑二分八釐八毫八絲三忽夷則內徑二分八釐毫六絲一忽南呂內徑二分七釐二毫六絲二忽無射內徑二分六釐四毫八絲六忽應鍾內徑二分五釐七毫三絲二忽
