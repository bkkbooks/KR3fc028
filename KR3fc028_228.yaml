body:
  text: 臀之羃積第七問曰周禮經文但云其臀一寸其實一豆不言周徑今何以知其周徑也答曰一豆者四升也一釜者八斗也八斗者八十升以八十升為法除釜之積實一千五百七十一寸三四八四得升之積實一十九寸六四一八五五求豆之積實則四因得七十八寸五百六十七分四百二十釐以深一寸為法除之得臀之面羃七十八寸五十六分七十四釐二十毫此以面羃知周徑也臀之內徑第八置臀之面羃七十八寸五六七四二自乘得六千一百七十二寸八三九四八五以一百六十二乘之一百除之得一萬寸名三乘方實初學不能開三乘方則依捷法
