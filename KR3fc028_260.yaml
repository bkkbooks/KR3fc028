body:
  text: 斜黍內徑二分三釐一毫縱黍內徑二分釐八毫橫黍外周一寸一分四釐三毫斜黍外周一寸分二釐九毫縱黍外周九分二釐六毫橫黍外徑三分六釐三毫斜黍外徑三分二釐七毫縱黍外徑二分九釐四毫三種律同異第二十三問曰三種黍律同乎異乎答曰其尺異而其律同也正論嘉量二書有尺圖可考也余著律呂正論專主縱黍八寸一分之律是故擇黍造尺先言縱黍次及斜黍橫黍嘉量算經專主橫黍十寸之律故於中卷止載橫黍而不言縱斜也今於或問略載算三種律同異以互相發明耳
