body:
  text: 底圈即臀之圓周也內徑一尺內周三尺一寸四分二釐六毫九六八內面羃七十八寸滿百為寸五十六分七四二內積實七十八寸滿千為寸五百六十七分四二外徑一尺寸二分外周三尺二寸分五釐五毫五七三六外面羃八十一寸滿百為寸七十四分一五四三外積實八十一寸滿千為寸七四一五四三容銅正數三寸一百七十四分一二三巳上五件共積七十寸六三六九六內外周徑羃積相求第十八各置所求內徑外加二分是為外徑與圓徑密率相乘退位為實四十乘之九歸得外周周徑相乘四歸得面羃以深乘之各得積實內外積實相減餘為容銅正數
