body:
  text: 下卷明律之音凡例律之得失以琴證之則昭昭然矣琴須先學操縵凡吹律一聲極長琴彈三十二聲名為全操縵琴彈一十六聲名為半操縵建子月黃鐘為均主俗名正調之平者旋宮第一調屬水黃鐘之羽南呂起調南呂畢曲旋宮第二調屬火黃鐘之徵林鐘起調林鐘畢曲旋宮第三調屬木黃鐘之角姑洗起調姑洗畢曲旋宮第四調屬金黃鐘之商太蔟起調太蔟畢曲旋宮第五調屬土黃鐘之宮黃鐘起調黃鐘畢曲建丑月大呂為均主俗名正調之高者旋宮第六調屬水大呂之羽無射起調無射畢曲旋宮第七調屬火大呂之徵夷則起調夷則畢曲旋宮第八調屬木大呂之角仲呂起調仲呂畢曲旋宮第九調屬金大呂之商夾鐘起調夾鐘畢曲旋宮第十調屬土大呂之宮大呂起調大呂畢曲
