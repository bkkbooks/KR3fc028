body:
  text: 源流呂氏春秋曰黃帝使伶倫作黃鍾之律因律以為量孔子家語曰黃帝治五氣設五量撫萬民度四方以順天地之紀國語曰伯禹釐改制量比類百則論語曰周有大賚善人是富謹權量審法度修廢官四方之政行焉明堂位曰周公制禮作樂頒度量而天下大服尚書大傳曰周公將制禮作樂優游三年而不能作將大作恐天下莫我知也將小作則為人子不能揚父之功烈德澤然後營洛邑以期天下之心於是四方民人和會周公曰示之以力役且猶至而況導之以禮樂乎其度量六年則頒故鄭注尚書云攝政六年頒度量制其禮樂成王即位乃始用之然則嘉量之始蓋自上古迄于成周而法象益精矣所謂時文思索允臻其極信哉
  hash: sha256:bf9b876ef95817d3fa70cfe17c2bf20b3e3c6826b32c08731eaac0c774d7c49e
