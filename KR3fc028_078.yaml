body:
  text: 後學載堉著初學開平方例第一用歸除開平方各算書未載是故詳載之凡學開方須造大算盤長九九八十一位或六六三十六位方可算也算盤梁上帖紙一長條上寫第一位第二位等項字樣使初學易曉也平方積平立二積初學難曉故表出之平方百纖為一微百微為一忽百忽為一絲百絲為一毫百毫為一釐百釐為一分百分為一寸百寸為一尺故曰幾十幾尺幾十幾寸幾十幾分幾十幾釐幾十幾毫幾十幾絲幾十幾忽幾十幾微幾十幾纖又平積
