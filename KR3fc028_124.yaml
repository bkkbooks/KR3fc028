body:
  text: 五百五十八分七百三十六釐有奇商第五位得四毫三因所商九釐得二分七釐並入下法共得三十一寸七分七釐與實一寸五百五十八分七百三十六釐相商五則太過三則不及所得該四為毫置於上商一十寸五分九釐之下共得一十寸五分九釐四毫別置一十寸五分九釐四毫以所商四毫乘之滿千毫為釐得四十二釐三百七十六毫又以下法三十一寸七分七釐乘之滿千釐為分滿千分為寸得一寸三百四十六分二百八十五釐五百二十毫隅法六十四毫相並減實一寸三百四十六分二百八十五釐五百八十四毫餘實二百一十二分四百五十釐四百一十八毫有奇商第六位得六絲三因所商四毫得一釐二毫並入下法共得三十一寸七分八釐二毫與實二百一十二分四百五十釐四百一十八毫相商七則太過五則不及所得該六為絲置於上商一十寸五分九釐四毫之下共得一十寸五分九釐四毫六絲別置一十寸五分九釐
