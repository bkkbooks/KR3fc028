body:
  text: 凡開立方將算盤梁上帖紙一條寫千百十寸百十分百十釐百十毫百十絲百十忽百十微百十纖之名至於纖巳下位數不立名色只隔二位畫一圈使開方除實不錯耳立方積立方千纖為一微千微為一忽千忽為一絲千絲為一毫千毫為一釐千釐為一分千分為一寸千寸為一尺故曰幾百幾十幾尺幾百幾十幾寸幾百幾十幾分幾百幾十幾釐幾百幾十幾毫幾百幾十幾絲幾百幾十幾忽幾百幾十幾微幾百幾十幾纖又立積一一再乘所得也
