body:
  text: 七分八釐三毫八絲九忽微乘之滿千忽爲絲滿千絲爲毫滿千毫爲釐得三百三釐六十四毫七百二十四絲八百四忽五百八十微九百纖隅法七百二十九纖相倂減實三百三釐六十四毫七百二十四絲八百四忽五百八十一微六百二十九纖餘實一十四釐六百七十九毫四百三十絲四百一十五忽一百三十五微八百七十一纖如欲開至二十五位須用八十一位筭盤先將蕤賓南呂等律各開至於七十餘位然後乃得立方積實其商除法同前但纖巳下不立名色所得長一尺五分九釐四毫六絲三忽九纖四三五九二九五二六四五六一八二五卽應鍾倍律半之得五寸二分九釐七毫三絲一忽五微四纖七一七九六四七六三二二八九一二五卽應鍾正律也置應鍾倍律進一位如應鍾正律而一得黃鍾倍律也
