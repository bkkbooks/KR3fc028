body:
  text: 鑄銅方寸較定積數第十九算家舊說金方寸重十六兩銀重十四兩玉重十二兩鉛重九兩半銅重七兩半鐵重六兩石重三兩不知當時依何稱尺按九章算術出於前漢張蒼或宗秦漢之制未可知也不然周禮注疏玉人條下引盈不足術曰玉方寸重七兩石方寸重六兩與今算家不同欲求周公舊制當依秬黍所造稱尺可也除金玉銀鉛不必論外只依周禮改煎金錫則不耗不耗然後權之權之然後準之準之然後量之量之以為釜夫所謂改煎者猶言各煎也改者更也煎畢又煎更之謂也先以紅銅佳者大火煎鎔去其粗滓而後稱之看是何斤兩稱畢又煎之只至斤兩不耗為止煎白錫亦如之煎畢然後每銅六斤對錫一斤此所
