body:
  text: 七忽一微一纖五二七二一六六七一七五在位以蕤賓倍律一尺四寸一分四釐二毫一絲三忽五微六纖二三七三九五四八八一六八九乘之所得為實以黃鍾正律一尺為法除之得夾鍾倍律長一尺六寸八分一釐七毫九絲二忽八微三纖五七四二九八六六二二五一折半得夾鍾正律長八寸四分八毫九絲六忽四微一纖五二五三七一四五四三三一一二五此之謂四正也因黃鍾求蕤賓猶冬夏二至也因南呂求夾鍾猶春秋二分也曆家謂之象限限者界也俗所謂界牆也先求黃鍾履端於始次求蕤賓舉正於中後求應鍾歸餘於終故曰律與曆一道也初學開立方例第四
