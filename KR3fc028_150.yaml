body:
  text: 求十二律外徑第十四黃鍾外徑五分整置臀之內徑在位二十為法除之得黃鍾之外徑進一位為實應鍾開方所得命作一尺二九三二為法除之大呂外徑四分八釐五毫七絲六忽太蔟外徑四分七釐一毫九絲三忽夾鍾外徑四分五釐八毫五絲忽姑洗外徑四分四釐五毫四絲五忽仲呂外徑四分三釐二毫七絲七忽蕤賓外徑四分二釐毫四絲五忽林鍾外徑四分釐八毫四絲八忽夷則外徑三分九釐六毫八絲五忽南呂外徑三分八釐五毫五絲五忽無射外徑三分七釐四毫五絲七忽應鍾外徑三分六釐三毫九絲一忽
