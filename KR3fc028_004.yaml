body:
  text: 無形而不竭以有數之法求無形之聲其法具存無作則巳苟有作者雖去聖人於千萬歲後無不得焉此古之君子知物之終始而憂世之慮深其多為之法而丁寧纖悉可謂至矣夫物莫不有制制莫不有則規矩準繩度量權衡皆制物之定則也蓋規以取其圓矩以成其方準以揆其平繩以就其正度以度其長短量以測其多寡權以審其輕重衡以定其低昂合是數者然後謂之有制知者創物巧者述之未有舍是而能自為之制者如孟子所謂不以規矩不能成方圓又曰權然後知輕重度然後知長短禮記所謂衡誠縣不可欺以輕重繩墨誠陳不可欺以曲直規矩誠設不可欺以方圓皆此之謂也通歷曰少昊用度量作樂器舜典曰同律度量衡古人以度定量以量定權必參相得而後黃
  hash: sha256:39878b718d3364a65df5509ec85874d09a2cdac402a530c551a00c311d267b94
