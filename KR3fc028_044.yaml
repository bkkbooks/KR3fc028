body:
  text: 黃鍾律九寸指此也三曰橫黍尺黃鍾長一尺史記曰黃鍾子一分去聲下同謂整一分卽是一尺前漢志曰度本起於黃鍾之長又曰太極元氣函三爲一又曰竹筭徑一分象黃鍾之一敍傳贊曰元元本本數始於一此則指黃鍾橫黍律其長一尺之明證也雖有三種之説筭經求度量取整數易筭只據橫黍百分爲尺故周禮曰鬴深一尺卽知黃鍾長一尺也置釜之積一千五百七十一寸三百四十八分四百釐爲實以一千六百龠爲法除之得九百八十二分百九十二釐七百五十毫是爲黃鍾一龠之積實又置釜之面羃一百五十七寸一十三分四十八釐四十毫爲實以一千六百龠爲法除之得九分八十二釐十九毫二十七絲五十忽
  hash: sha256:9f1a8fc8d181e686130337e39533f0840bf5b46650f971c9770513c21596d8f4
