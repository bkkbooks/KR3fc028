body:
  text: 用也因其固有行所無事其間略加修治蓋亦無妨不云玉不琢不成器切磋琢磨於理何害近代不然失之遠矣余之新法先擇外周外徑挾斧入林必帶紙條圍竹考其外周外徑長短之節與某律合就寫某律名號截取中間一節不許傷毀竹皮工夫全在外周外徑待蒸曬乾然後照依前條方法整理內周內徑可也管內必須漆第二十六竹木性柔易於展縮日曬則小雨濕則大所容水銀每次不同必須漆其管庶奈水濕也然漆不過漆其管內而巳管外切不可漆文選洞簫賦所謂絳唇者此之謂也非若神樂觀排簫通漆也通漆最俗朱漆尤俗惟黑漆裏不俗耳底簫櫝簫皆最俗不可用也
  hash: sha256:4f2f2ece6540c224b71f9a17a66c19835fb4549451f64872a05f8c43358631e6
