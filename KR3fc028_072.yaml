body:
  text: 鑄金之狀而餘條所無者何也蓋因量之一物深淺合度分釐要明輕重合權斤兩要準聲音合律宮商要協此所以為難也特著煉銅鑄法於量條下使鑄者愼之耳嘗依橫黍尺造銅方寸天平稱重四兩巳上此乃煉之得法火候到也不佳則不足四兩此乃煉之不熟火候不到也火候不到則內中發虛是故分兩少也嗚呼斯乃要中之要故特著於卷末以示同志者耳余所以至老好之者正為屢鑄不成幸而既成自得其趣喜不自勝言不盡意是故大學以格物致知為首而致知在格物此可見其一端論語所謂游於藝者非數術之謂歟余喜嘉量書成紀歲月於篇末時萬曆庚戍閏三月初十日載堉自序嘉量算經上卷
