body:
  text: 百二十八毫二十九絲八百四十七忽餘實三百一十七釐七百四十四毫一百五十五絲二百一十九忽有奇商第八位得空微三因所商三忽得九忽倂入下法共得三十一寸七分八釐三毫八絲九忽與實三百一十七釐七百四十四毫一百五十五絲二百一十九忽相商一微該三百三十六釐實不及減所得空位爲微置於上商一十寸五分九釐四毫六絲三忽之下共得一十寸五分九釐四毫六絲三忽空微無減餘實同上商第九位得九纖三因所商空微得空微倂入下法共得三十一寸七分八釐三毫八絲九忽微與實三百一十七釐七百四十四毫一百五十五絲二百一十九忽相商九則適足八則不及所得該九爲纖置於上商一十寸五分九釐四毫六絲三忽微之下共得一十寸五分九釐四毫六絲三忽九纖別置一十寸五分九釐四毫六絲三忽九纖以所商九纖乘之滿千纖爲微滿千微爲忽得九百五十三忽五百一十六微七百八十一纖又以下法三十一寸
