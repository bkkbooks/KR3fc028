body:
  text: 載堉曰余玩數學之妙出於天地自然非由人力所杜撰也嘉量一器固黃鍾所自出設若周徑羃積交互相求而不能合則非妙矣嘗一一試之各置其長以其面羃乘之得其積實四因面羃以周除之得徑以徑除之得周此係正法又法釜之內徑一尺四寸一分四釐二毫一絲三忽五微六纖命作弦率臀之內周三尺一寸四分二釐六毫九絲六忽八微命作周率臀之內徑一尺命作徑率徑求周者置所求徑在位周率乘之徑率除之得周周求徑者置所求周在位徑率乘之周率除之得徑各置內周內徑在位弦率乘之徑率除之得其外周外徑此係捷法如帝網之融攝重重無盡非俗眼所識也嗚呼妙哉嘉量算經中卷終
  hash: sha256:739912b1e5e4cb8d90658447fa9987cfde57a40d2b9cbc9820d6c957b71dcaa8
