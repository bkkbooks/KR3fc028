body:
  text: 或問於余曰昔周公作嘉量何為而作也曰余聞諸先儒曰聲無形而樂有器古之作樂者知器之必有敝而聲不可以言傳懼器失而聲遂亡也乃多為之法以著之故始求聲者以律而造律者以黍自一黍之廣積而為分寸一黍之多積而為籥合一黍之重積而為銖兩此造律之本也故為長短之法而著於度為多少之法而著於量為輕重之法而著於權衡是三物者亦必有時而敝則又總其法而著於數使其分寸籥合銖兩皆起於黃鐘然後律度量衡相用為表裏使得律者可以制度量衡因度量衡亦可以制律不幸而皆亡則推其法數而制之用其長短多少輕重以相參考四者既同而聲必至聲至而後樂可作矣夫物用於有形而必敝聲藏於
  hash: sha256:2874f213bd35fbde278b316f9f983f0f7189f11151860e3e25e5b5d76dd6565a
