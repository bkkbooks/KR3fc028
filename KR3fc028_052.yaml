body:
  text: 八百五十五釐以耳深四寸除之得四寸九十一分十四釐六十三毫七十五絲是為耳之面羃自乘得二十四寸一十一分二十六釐五十四毫二十四絲以一百六十二乘之一百除之得三十九寸十六分二十五釐為實開平方法除之得六寸二分半副置之其一折半為實開方所得四十乘之九歸得七寸八分五釐六毫七絲四忽二微為耳之內周其一不折半開平方法除之得二寸五分為耳之內徑周徑相乘四歸復得耳之面羃以深四寸乘之得耳受一升之積實而還元矣釜區豆升四量之積實第十四舊說四區為釜釜乃六斗四升其說非是黃鍾合籥為合十合為升十升為斗八斗為釜一釜乃五區也區乃四豆也豆乃四
