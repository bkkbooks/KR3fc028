body:
  text: 四毫六絲以所商六絲乘之滿千絲為毫得六百三十五毫六百七十六絲又以下法三十一寸七分八釐二毫乘之滿千毫為釐滿千釐為分得二百二分三十釐五百四十六毫三百二十絲隅法二百一十六絲相並減實二百二分三十釐五百四十六毫五百三十六絲餘實一十分四百一十九釐八百七十二毫一百八十五絲有奇商第七位得三忽三因所商六絲得一毫八絲並入下法共得三十一寸七分八釐三毫八絲與實一十分四百一十九釐八百七十二毫一百八十五絲相商四則太過二則不及所得該三為忽置於上商一十寸五分九釐四毫六絲之下共得一十寸五分九釐四毫六絲三忽別置一十寸五分九釐四毫六絲三忽以所商三忽乘之滿千忽為絲滿千絲為毫得三毫一百七十八絲三百八十九忽又以下法三十一寸七分八釐三毫八絲乘之滿千毫為釐滿千釐為分得一十分一百二釐一百二十八毫二十九絲八百二十忽隅法二十七忽相並減實一十分一百二釐一
