body:
  text: 是為黃鍾面羃又置釜之內周四尺四寸四分四釐四毫四絲四忽四微四纖為實以四十為法除之得一寸一分一釐一毫一絲一忽一微一纖是為黃鍾內周又置釜之內徑一尺四寸一分四釐二毫一絲三忽五微六纖為實以四十為法除之得三分五釐三毫五絲五忽三微三纖九塵是為黃鍾內徑天地自然真數如此黃鍾面羃周徑密率第十一舊用圍三徑一之率以求周徑最極疏舛依周公古率置黃鍾面羃自乘所得在位一百六十二乘之得一萬五千六百二十五分以一百除之得一百五十六分二十五釐為實開平方法除之得一十二分半副置之其一折半開方得二分五釐以四十乘之九歸得一寸一分一釐一毫一絲
  hash: sha256:92cbc79d1fb354ca2c0142a1f81f473b5b5acc7b532338058d6c07b8dfc7c8f4
