body:
  text: 乃置弦羃爲實開平方法除之得弦一尺四寸一分四釐二毫一絲三忽五微六纖是爲釜之內徑折半得七寸分七釐一毫絲六忽七微八纖是名圓徑密率此周公嘉量之本法也後世筭家嫌其太煩削去自分巳下惟取自寸巳上故名約率圓徑七也釜之周爲周率第三方外求圓之術內方當圓十分之九假如內方九寸四面共該三十六寸則其外圓一周共該四十寸也今此嘉量內方十寸四十乘之得四十尺爲實九歸得周四尺四寸四分四釐四毫四絲四忽四微四纖是爲釜之內周折半得二尺二寸二分二釐二毫二絲二忽二微二纖是名圓周密率此周公嘉量之本法也後世筭家嫌其
