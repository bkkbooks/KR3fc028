body:
  text: 謂改煎金錫則不耗不耗然後權之六分其金而錫居其一也卻將對就之銅煎令濁氣出盡而後鑄立方寸磨令光澤務重四兩巳上此所謂然後準之也一一量之每面皆合立方橫黍尺之十分所謂然後量之以爲鬴也今依此法鑄成方寸秤重見今天平四兩七分七釐半爲方一寸之積數爲法以除二百八十八兩得方寸者七十枚三分之二是爲此器銅之正數共重時秤二百八十八兩大圈重一百八十二兩半卽鬴之體大底重六十六兩卽鬴之底耳圈重十三兩四分兩之一卽升之周兩耳共重二十六兩半底圈重十三兩卽臋之周是爲古秤四百八十兩卽三十斤爲均之數
  hash: sha256:3a8fefb90d4a82ad3b64ceb8e448935f3e42e6d77b3c128069207e55d8e787c9
