body:
  text: 謂改煎金錫則不耗不耗然後權之六分其金而錫居其一也卻將對就之銅煎令濁氣出盡而後鑄立方寸磨令光澤務重四兩巳上此所謂然後準之也一一量之每面皆合立方橫黍尺之十分所謂然後量之以為釜也今依此法鑄成方寸稱重見今天平四兩七分七釐半為方一寸之積數為法以除二百八十八兩得方寸者七十枚三分之二是為此器銅之正數共重時稱二百八十八兩大圈重一百八十二兩半即釜之體大底重六十六兩即釜之底耳圈重十三兩四分兩之一即升之周兩耳共重二十六兩半底圈重十三兩即臀之周是為古稱四百八十兩即三十斤為均之數
