body:
  text: 圓內黑方者所謂方尺也每面十寸共積一百寸方外圓內有全方三十二寸其餘破方互相補湊得二十五寸有奇黑白全破之方共積一百五十七寸有奇為釜之面羃以深一尺乘之得一千五百七十一寸有奇則釜之積實也耳徑二寸五分則與十字中心合算黃鍾三種律第十一橫黍律長十寸史記所謂子一分者是也一分猶言一尺即十寸也斜黍律長九寸後漢志所謂黃鍾律長九寸者是也縱黍律長八寸一分淮南子所謂黃鍾之數八十一是也橫黍內周一寸一分一釐一毫斜黍內周一寸置斜黍進位九歸得橫黍退位九因得縱黍餘放此縱黍內周九分橫黍內徑三分五釐三毫
  hash: sha256:fdf310b6ab755afe809edd8a557c3a2fecb238e6a1b2c7ad6771e64e01d40d5b
