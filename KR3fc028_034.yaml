body:
  text: 後學載堉著釜乃八斗第一洪武正韻鍾字條下解鍾為八斛余因此乃悟左傳謂釜十則鍾鍾為八斛則釜為八斗明矣先儒解為六斗四升非也一言透徹則律度量衡之理悉透徹而無餘蘊千載絶傳之學余幸而得之若更使絶傳則不仁矣豈不聞論語曰人能弘道非道弘人繼絶表微此之謂歟釜之徑為徑率第二經謂此釜深尺內方尺而圓其外此乃算家所謂圓內容方方外求圓即勾股求弦法也內方一尺縱十寸名為股自乘得一百寸名為股羃橫十寸名為勾自乘得一百寸名為勾羃相併得二百寸名為弦羃
