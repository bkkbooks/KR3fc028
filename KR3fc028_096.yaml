body:
  text: 自此巳後開至二十五位其術同前但纖巳下不立名色共得斜弦一尺四寸一分四釐二毫一絲三忽五微六纖二三七三九五四八八一六八九即蕤賓倍律也折半長七寸七釐一毫六忽七微八纖一一八六五四七五二四四八四四五即蕤賓正律也子午卯酉相生第三問黃鍾正律長十寸為平方面其兩隅斜弦即蕤賓倍律以黃鍾正律乘蕤賓倍律得平方積一百四十一寸四十二分一十三釐五十六毫二十三絲七十三忽九微五十纖四八八一六八九開平方法除之所得即南呂倍律其長幾何答曰長一尺一寸八分九釐二毫七忽一微一纖五二七二一六六七一
