body:
  text: 開方兩遍代之初開平方得一百寸為實再開平方得一十寸是為臀之內徑臀之內周第九置臀之面羃七十八寸五六七四二為實四因得三百一十四寸二六九六八以臀徑十寸為法除之得三尺一寸四分二釐六毫九絲六忽八微是為臀之內周此係舊法四因面羃以徑除之得周是也耳之羃積周徑第十問曰經文其耳三寸今則改為四寸何也答曰臀之周三尺一寸四分二釐六毫九絲六忽八微以四除之則得耳之周七寸八分五釐六毫七絲四忽二微五歸得黃鍾之外周臀之徑一尺以四除之則得耳之徑二寸五分五歸得黃鍾之外徑臀之面羃七十八寸五十六分七十四釐二十毫以四除之又以
  hash: sha256:b4f6cc68e5826b9ac5940ecd3539d34a8633ee06c6ff99970c61f4510ad920a9
