body:
  text: 置於上商一十寸之下共得一十空寸無減餘實同上商第三位得五分三因所商一十空寸得三十空寸爲下法與實一百八十九寸相商六則太過四則不及所得該五爲分置於上商一十空寸之下共得一十寸五分別置一十寸五分以所商五分乘之得五百二十五分又以下法三十空寸乘之滿千分爲寸得一百五十七寸五百分隅法一百二十五分相倂減實一百五十七寸六百二十五分餘實三十一寸五百八十二分有奇商第四位得九釐三因所商五分得一寸五分倂入下法共得三十一寸五分與實三十一寸五百八十二分相商九則適足八則不及所得該九爲釐置於上商一十寸五分之下共得一十寸五分九釐別置一十寸五分九釐以所商九釐乘之滿千釐爲分得九分五百三十一釐又以下法三十一寸五分乘之滿千分爲寸得三十寸二十二分六百五十釐隅法七百二十九釐相倂減實三十寸二十三分三百七十九釐餘實一寸
