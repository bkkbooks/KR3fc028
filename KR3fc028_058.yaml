body:
  text: 得黃鍾之內周釜之徑一尺四寸一分四釐二毫一三五六爲實四十爲法除之得三分五釐三毫五五三三九是爲黃鍾之內徑臋之徑一尺爲實倍釜徑作二尺八寸二八四二七一二爲法除之亦得黃鍾之內徑耳之徑二寸五分爲實半釜徑作七寸七一六七八爲法除之亦得黃鍾之內徑然須親筭始覺其妙釜及臋耳內外周徑面羃積實容受銅數第十六與下二篇作一事看律家多不言外周外徑者以其不曉律管之形同於筭家環田之術故也欲鑄嘉量釜及臋耳銅之斤兩皆須合於權衡之數苟無外周外徑之術則其厚薄尙不可知安知空隙廣狹受銅若干合於三十斤爲均之數哉因此外周外徑之面羃積實而與內周內徑之面羃積實不相同也余著筭經篤志務要精密故須明此至理專爲嘉量設也明此而後嘉量可鑄是故分條開列于後
