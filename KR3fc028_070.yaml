body:
  text: 鑄量以煉銅爲至要第二十按周禮曰知去聲者創物巧者述之守之世謂之工百工之事皆聖人之作也若伏羲作瑟神農作琴黃帝作律管之類攻金之工攻專治也凡有六種築氏執下齊齊去聲卽分劑之劑古註云大刃削殺矢用錫多取其利也錫多名下齊冶氏執上齊鍾鼎斧斤戈戟用錫少取其堅也錫少名上齊鳧氏爲聲鍾之屬不止鍾㮚氏爲量鬴之屬不止鬴段氏爲鎛器田器也經文亡桃氏爲刃劍之屬不止劍金有六齊六分其金而錫居一每銅一斤用錫二兩六錢六分謂之鍾鼎之齊五分其金而錫居一每銅一斤用錫三兩二錢謂之斧斤之齊四分其金而錫居一每銅一斤用錫四兩謂之戈戟之齊三分其金而錫居一每銅一斤用錫五兩三錢三分謂之大刃之齊五分其金而錫居二每銅一斤用錫六兩四錢謂之削殺矢之齊金錫半銅錫停半或曰每銅一斤用錫半斤謂之鑑燧之齊巳上經文言之詳矣獨於㮚氏條下詳載
