body:
  text: 方圓密率算術周徑羃積相求周求徑者置周全數九因四十除之所得自乘倍之為實開平方法除之得徑徑求周者置徑全數自乘半之為實開平方法除之所得四十乘之九歸得周周求面羃者置周全數九因四十除之所得自乘倍之為實又自乘畢以一百乘之一百六十二除之所得為實開平方法除之得面羃徑求面羃者置徑全數自乘為實又自乘畢一百乘之一百六十二除之所得為實開平方法除之得面羃面羃求周及徑者置面羃全數自乘所得一百六十二乘之一百除之為實開平方法除之所得副置其一折半為實開平方法除之所得四十乘之九歸得周其一則不折半但以開平方法除之得徑此乃周公所撰而算家失其傳故表出之
