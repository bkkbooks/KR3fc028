body:
  text: 周禮經文見冬官考工記㮚氏爲量改煎金錫則不耗不耗然後權之權之然後準之準衣然後量之量之以爲鬴深尺内方尺而圜其外其實一鬴其臋一寸其實一豆其耳三寸其實一升重一釣其聲中黃鍾之宮槩而不稅其銘曰時文思索允臻其極嘉量既成以觀四國永啟厥後兹器維肌凡鑄金之狀金與錫黑濁之氣竭黄白次之黄白之氣竭青白次之青白之氣竭青氣次之然後可鑄也凡一百四十四字載堉曰㮚讀如實堅實好實穎實栗之栗稱氏者世官也鬴所以示人以量也深尺示度也内方尺示矩也圓其外示規也臋一寸耳三寸三當作四皆示度也實一鬴即八斗也實一豆即四升也實一升即二十龠皆示量也重三十斤示權衡也明此皆出於黄鍾之律也
