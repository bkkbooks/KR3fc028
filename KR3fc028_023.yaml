body:
  text: 周禮經文見冬官考工記栗氏為量改煎金錫則不耗不耗然後權之權之然後準之準衣然後量之量之以為釜深尺內方尺而圜其外其實一釜其臀一寸其實一豆其耳三寸其實一升重一釣其聲中黃鍾之宮槩而不稅其銘曰時文思索允臻其極嘉量既成以觀四國永啓厥後兹器維肌凡鑄金之狀金與錫黑濁之氣竭黃白次之黃白之氣竭青白次之青白之氣竭青氣次之然後可鑄也凡一百四十四字載堉曰栗讀如實堅實好實穎實栗之栗稱氏者世官也釜所以示人以量也深尺示度也內方尺示矩也圓其外示規也臀一寸耳三寸三當作四皆示度也實一釜即八斗也實一豆即四升也實一升即二十籥皆示量也重三十斤示權衡也明此皆出於黃鍾之律也
