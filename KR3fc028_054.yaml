body:
  text: 升也置一升之積數一十九寸六百四十一分八百五十五釐在位四因得七十八寸五百六十七分四百二十釐是為一豆之積數又四因得三百一十四寸二百六十九分六百八十釐是為一區之積數又五因得一千五百七十一寸三百四十八分四百釐而釜之積實還元矣釜豆升互相求得黃鍾第十五合籥為合合乃二籥也十合為升升乃二十籥也十升為斗斗乃二百籥也八斗為釜釜乃一千六百籥也以一千六百除釜之積數得九百八十二分百九十二釐七百五十毫與今新測黃鍾一籥之積密合又以二十籥四因得八十為法以除臀之積數得黃鍾一籥之積數亦無不合又置耳之積數為實一升乃二十籥除之
  hash: sha256:76a23b5d38c941925d2b4187ed1767515c716c3f90343fea422e442de4ce9611
