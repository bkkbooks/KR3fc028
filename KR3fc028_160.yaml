body:
  text: 旋宮第三十七調屬火林鐘之徵太蔟起調太蔟畢曲旋宮第三十八調屬木林鐘之角應鐘起調應鐘畢曲旋宮第三十九調屬金林鐘之商南呂起調南呂畢曲旋宮第四十調屬土林鐘之宮林鐘起調林鐘畢曲建申月夷則爲均主俗名縵角調之高者旋宮第四十一調屬水夷則之羽仲呂起調仲呂畢曲旋宮第四十二調屬火夷則之徵夾鐘起調夾鐘畢曲旋宮第四十三調屬木夷則之角黃鐘起調黃鐘畢曲旋宮第四十四調屬金夷則之商無射起調無射畢曲旋宮第四十五調屬土夷則之宮夷則起調夷則畢曲建酉月南呂爲均主俗名清商調之下者旋宮第四十六調屬水南呂之羽蕤賔起調蕤賔畢曲旋宮第四十七調屬火南呂之徵姑洗起調姑洗畢曲旋宮第四十八調屬木南呂之角大呂起調大呂畢曲旋宮第四十九調屬金南呂之商應鐘起調應鐘畢曲旋宮第五十調屬土南呂之宮南呂起調南呂畢曲
