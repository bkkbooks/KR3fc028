body:
  text: 三家注解並未有所發明余按商高曰靑黑為表丹黃為裏以象天地有此器故云耳今以木造成圓方格式其形圓徑與方斜同方中矩圓中規方圓皆厚一寸方每面皆九寸一周共計三十六寸圓每面皆十寸一周共計四十寸用紙條潔圓一匝潔方一匝看餘幾寸若餘四寸是與算合此乃周公所造密率之源流也徑求周率第二置徑一尺四寸一分四釐二毫一絲三忽五微六纖在位自乘得二百寸折半得一百寸為實即圓內容方全數也開平方法除之得一十寸即圓內方一面之數四十乘之得四百寸即九倍其圓周之數九歸得四尺四寸四分四釐四毫四絲四忽四微四纖即其周也周求徑率第三
