body:
  text: 黃鍾容水銀六兩八分九釐大呂容水銀五兩四錢二分四釐太蔟容水銀四兩八錢三分二釐夾鍾容水銀四兩三錢五釐姑洗容水銀三兩八錢三分五釐仲呂容水銀三兩四錢一分七釐蕤賓容水銀三兩四分四釐林鍾容水銀二兩七錢一分二釐夷則容水銀二兩四錢一分六釐南呂容水銀二兩一錢五分二釐無射容水銀一兩九錢一分八釐應鍾容水銀一兩七錢八釐考外周外徑第二十五問曰前漢志所謂斷兩節閒生竅厚均者何謂厚均也答曰厚則易於整理薄則難於施為可見古人制律亦必用磋鑽非不
