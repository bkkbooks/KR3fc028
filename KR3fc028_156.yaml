body:
  text: 建寅月太蔟為均主俗名縵宮調之平者旋宮第十一調屬水太蔟之羽應鐘起調應鐘畢曲旋宮第十二調屬火太蔟之徵南呂起調南呂畢曲旋宮第十三調屬木太蔟之角蕤賔起調蕤賔畢曲旋宮第十四調屬金太蔟之商姑洗起調姑洗畢曲旋宮第十五調屬土太蔟之宮太蔟起調太蔟畢曲建卯月夾鐘為均主俗名縵宮調之高者旋宮第十六調屬水夾鐘之羽黃鐘起調黃鐘畢曲旋宮第十七調屬火夾鐘之徵無射起調無射畢曲旋宮第十八調屬木夾鐘之角林鐘起調林鐘畢曲旋宮第十九調屬金夾鐘之商仲呂起調仲呂畢曲旋宮第二十調屬土夾鐘之宮夾鐘起調夾鐘畢曲建辰月姑洗為均主俗名緊羽調之下者旋宮第二十一調屬水姑洗之羽大呂起調大呂畢曲旋宮第二十二調屬火姑洗之徵應鐘起調應鐘畢曲旋宮第二十三調屬木姑洗之角夷則起調夷則畢曲
